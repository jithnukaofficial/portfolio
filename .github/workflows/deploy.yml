name: CI/CD Pipeline — Jithnuka Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container images
        run: |
          podman build -f containers/frontend/Containerfile -t portfolio-frontend:latest .
          podman build -f containers/backend/Containerfile  -t portfolio-backend:latest  .

      - name: Save images
        run: |
          podman save portfolio-frontend:latest -o /tmp/frontend.tar
          podman save portfolio-backend:latest  -o /tmp/backend.tar

      - name: Deploy to Droplet
        if: github.ref == 'refs/heads/main'
        env:
          DROPLET_IP: '68.183.184.181'
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts

          # Copy images to Droplet
          scp /tmp/frontend.tar /tmp/backend.tar deploy@$DROPLET_IP:/tmp/

          # SSH and redeploy
          ssh deploy@$DROPLET_IP << 'ENDSSH'
            set -e
            podman load < /tmp/frontend.tar
            podman load < /tmp/backend.tar
            cd /var/www/portfolio
            git pull origin main
            podman-compose down
            podman-compose up -d
            rm -f /tmp/frontend.tar /tmp/backend.tar
            podman image prune -f
            podman ps
          ENDSSH

      - name: Health Check
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 20
          curl -f http://68.183.184.181/api/health
          curl -f http://68.183.184.181/
          echo "✅ Deployment verified!"
