# ─── Jithnuka Portfolio — Podman Compose ──────────────────
# Usage:
#   podman-compose up -d          # start all services
#   podman-compose down           # stop all
#   podman-compose logs -f        # live logs
#   podman-compose ps             # status

version: "3.8"

networks:
  portfolio-net:
    driver: bridge

volumes:
  jenkins_home:

services:

  # ── Frontend (React → Nginx) ────────────────────────────
  frontend:
    build:
      context: .
      containerfile: containers/frontend/Containerfile
    image: portfolio-frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    networks:
      - portfolio-net
    depends_on:
      - backend
    labels:
      - "app=portfolio"
      - "tier=frontend"

  # ── Backend (Node.js API) ───────────────────────────────
  backend:
    build:
      context: .
      containerfile: containers/backend/Containerfile
    image: portfolio-backend:latest
    container_name: portfolio-backend
    restart: unless-stopped
    networks:
      - portfolio-net
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    labels:
      - "app=portfolio"
      - "tier=backend"

  # ── Reverse Proxy (Nginx — public entry point) ──────────
  proxy:
    image: nginx:1.25-alpine
    container_name: portfolio-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./containers/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - portfolio-net
    depends_on:
      - frontend
      - backend
    labels:
      - "app=portfolio"
      - "tier=proxy"

  # ── Jenkins CI/CD ───────────────────────────────────────
  jenkins:
    build:
      context: containers/jenkins
      containerfile: Containerfile
    image: portfolio-jenkins:latest
    container_name: portfolio-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"       # Jenkins UI
      - "50000:50000"     # Jenkins agents
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/podman:/usr/bin/podman
    networks:
      - portfolio-net
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    labels:
      - "app=portfolio"
      - "tier=cicd"

  # ── Portainer GUI (Container Management UI) ─────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portfolio-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"       # Portainer UI
    volumes:
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - portfolio-net
    labels:
      - "app=portfolio"
      - "tier=management"

volumes:
  jenkins_home:
  portainer_data:
