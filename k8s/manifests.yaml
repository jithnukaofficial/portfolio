# Kubernetes Manifests for Jithnuka Portfolio
# Using k3s (lightweight Kubernetes) on single Droplet
# IP: 68.183.184.181
# Apply: kubectl apply -f k8s/

---
# ── Namespace ─────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: portfolio
  labels:
    app: portfolio

---
# ── Backend Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  namespace: portfolio
  labels:
    app: portfolio-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
    spec:
      containers:
        - name: backend
          image: portfolio-backend:latest
          imagePullPolicy: Never       # using local image
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: portfolio-backend-secret
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

---
# ── Backend Service ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend
  namespace: portfolio
spec:
  selector:
    app: portfolio-backend
  ports:
    - port: 5000
      targetPort: 5000

---
# ── Frontend Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: portfolio
  labels:
    app: portfolio-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
    spec:
      containers:
        - name: frontend
          image: portfolio-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
# ── Frontend Service ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: portfolio-frontend
  namespace: portfolio
spec:
  selector:
    app: portfolio-frontend
  ports:
    - port: 80
      targetPort: 80

---
# ── Ingress (routes HTTP traffic by path) ─────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ""          # matches IP directly
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: portfolio-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-frontend
                port:
                  number: 80

---
# ── Secret (backend env vars — fill before applying) ──────
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-backend-secret
  namespace: portfolio
type: Opaque
stringData:
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: "YOUR_GMAIL@gmail.com"          # <-- fill this
  SMTP_PASS: "YOUR_APP_PASSWORD"             # <-- fill this
  CONTACT_EMAIL: "jithnukanimandith2002@gmail.com"
  CORS_ORIGIN: "http://68.183.184.181"
